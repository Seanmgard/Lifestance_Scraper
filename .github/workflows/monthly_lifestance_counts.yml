name: Monthly LifeStance Counts

on:
  workflow_dispatch:

  schedule:
    # Runs on the 1st of every month at 6:15 AM New York time.
    - cron: "15 6 1 * *"
      timezone: "America/New_York"

permissions:
  contents: write

concurrency:
  group: monthly-lifestance-counts
  cancel-in-progress: false

jobs:
  scrape-counts:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run LifeStance counts scrape
        run: |
          python lifestance_counts.py --outdir lifestance_output

      - name: Upload Excel output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifestance-state-counts-${{ github.run_id }}
          path: lifestance_output/*.xlsx
          retention-days: 180

      - name: Commit monthly output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add lifestance_output/*.xlsx

          if git diff --cached --quiet; then
            echo "No new output to commit."
          else
            git commit -m "Monthly LifeStance counts $(date +'%Y-%m-%d')"
            git push
          fi